name: CI/CD with Docker

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ./Budget.domain.sln

      - name: Build solution
        run: dotnet build ./Budget.domain.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test ./Budget.domain.sln --no-build --verbosity normal
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t budget-app .
